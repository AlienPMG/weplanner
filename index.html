<style>

<body>
<div id="toast" class="toast"></div>
<div class="app" id="app"><div class="loading"><div style="text-align:center"><div style="font-size:48px;margin-bottom:12px">🎉</div>Chargement...</div></div></div>

<script>
// ============================================
// STATE
// ============================================
let currentEventCode = localStorage.getItem('wp_current_event');
let currentUserId = null;
let eventData = null;
let activeTab = 'overview';

const catEmoji = {food:'🍕',drinks:'🍻',accommodation:'🏠',transport:'🚗',activities:'🎯',other:'📦'};
const catLabel = {food:'Nourriture',drinks:'Boissons',accommodation:'Hébergement',transport:'Transport',activities:'Activités',other:'Autre'};

// ============================================
// UTILS
// ============================================
function getAvatarColor(n){const c=['#6366f1','#ec4899','#f97316','#22c55e','#3b82f6','#8b5cf6','#ef4444','#14b8a6','#f59e0b','#06b6d4'];let h=0;for(let i=0;i<n.length;i++)h=n.charCodeAt(i)+((h<<5)-h);return c[Math.abs(h)%c.length]}
function getInitials(n){return n.split(' ').map(x=>x[0]).join('').toUpperCase().slice(0,2)}
function fmtCur(a){return new Intl.NumberFormat('fr-FR',{style:'currency',currency:'EUR'}).format(a)}
function fmtTime(t){const d=new Date(t),now=new Date(),df=now-d;if(df<60000)return"à l'instant";if(df<3600000)return`il y a ${Math.floor(df/60000)}min`;if(df<86400000)return`il y a ${Math.floor(df/3600000)}h`;return d.toLocaleDateString('fr-FR',{day:'numeric',month:'short',hour:'2-digit',minute:'2-digit'})}
function toast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500)}
function pName(id){if(!eventData)return'?';const p=eventData.participants.find(x=>x.id===id);return p?p.name:'?'}
function genCode(){const c='ABCDEFGHJKLMNPQRSTUVWXYZ23456789';let r='';for(let i=0;i<6;i++)r+=c[Math.floor(Math.random()*c.length)];return r}

// ============================================
// DATABASE FUNCTIONS
// ============================================

async function createEvent(title, name, desc, location, dateStart, dateEnd) {
  const code = genCode();

  const {data: event, error} = await sb.from('events')
    .insert({code, title, description: desc, location, date_start: dateStart, date_end: dateEnd, created_by: name})
    .select().single();

  if (error) { toast('❌ Erreur: ' + error.message); return; }

  const {data: participant} = await sb.from('participants')
    .insert({event_id: event.id, name, status: 'confirmed'})
    .select().single();

  await sb.from('messages').insert({
    event_id: event.id, participant_id: participant.id,
    content: '🎉 ' + name + ' a créé le weekend !', is_system: true
  });

  currentEventCode = code;
  currentUserId = participant.id;
  localStorage.setItem('wp_current_event', code);
  localStorage.setItem('wp_user_' + code, participant.id);

  toast('Weekend créé ! Code : ' + code + ' 🎉');
  await loadEvent();
}

async function loadEvent() {
  if (!currentEventCode) { renderHome(); return; }

  const {data: event} = await sb.from('events')
    .select('*').eq('code', currentEventCode).single();

  if (!event) {
    currentEventCode = null;
    localStorage.removeItem('wp_current_event');
    renderHome(); return;
  }

  const {data: participants} = await sb.from('participants')
    .select('*').eq('event_id', event.id).order('created_at');

  const {data: expenses} = await sb.from('expenses')
    .select('*, participant:participants!paid_by(name)')
    .eq('event_id', event.id).order('created_at', {ascending: false});

  const {data: polls} = await sb.from('polls')
    .select('*, poll_options(*, poll_votes(*, participant:participants(*)))')
    .eq('event_id', event.id).order('created_at', {ascending: false});

  const {data: messages} = await sb.from('messages')
    .select('*, participant:participants(name)')
    .eq('event_id', event.id).order('created_at');

  const {data: todos} = await sb.from('todos')
    .select('*, assigned:participants(name)')
    .eq('event_id', event.id).order('created_at');

  eventData = {
    ...event,
    participants: participants || [],
    expenses: expenses || [],
    polls: polls || [],
    messages: messages || [],
    todos: todos || []
  };

  currentUserId = localStorage.getItem('wp_user_' + currentEventCode);

  // Vérifier que le user existe toujours
  if (currentUserId && !eventData.participants.find(p => p.id === currentUserId)) {
    currentUserId = null;
    localStorage.removeItem('wp_user_' + currentEventCode);
  }

  renderEvent();
}

async function joinEvent(code) {
  const {data: event} = await sb.from('events')
    .select('*').eq('code', code.toUpperCase()).single();

  if (!event) { toast('❌ Code introuvable !'); return false; }

  currentEventCode = code.toUpperCase();
  localStorage.setItem('wp_current_event', currentEventCode);
  await loadEvent();
  return true;
}

async function joinAsParticipant(name) {
  // Vérifier si le nom existe déjà
  const existing = eventData.participants.find(
    p => p.name.toLowerCase() === name.toLowerCase()
  );

  if (existing) {
    currentUserId = existing.id;
    localStorage.setItem('wp_user_' + currentEventCode, existing.id);
    toast('Content de te revoir, ' + existing.name + ' ! 👋');
    await loadEvent();
    return;
  }

  const {data, error} = await sb.from('participants')
    .insert({event_id: eventData.id, name, status: 'confirmed'})
    .select().single();

  if (error) {
    if (error.code === '23505') toast('⚠️ Ce nom existe déjà !');
    else toast('❌ Erreur: ' + error.message);
    return;
  }

  await sb.from('messages').insert({
    event_id: eventData.id, participant_id: data.id,
    content: '👋 ' + name + ' a rejoint le weekend !', is_system: true
  });

  currentUserId = data.id;
  localStorage.setItem('wp_user_' + currentEventCode, data.id);
  toast('Bienvenue ' + name + ' ! 🎉');
  await loadEvent();
}

// ============================================
// RENDER HOME
// ============================================
function renderHome() {
  document.getElementById('app').innerHTML = `
    <div class="sc" style="margin-top:40px">
      <div style="text-align:center;margin-bottom:24px">
        <div style="font-size:56px;margin-bottom:8px">🎉</div>
        <h2>Weekend Planner</h2>
        <p class="sub">Organise ton weekend entre potes</p>
      </div>

      <div style="background:var(--pri-l);padding:16px;border-radius:12px;margin-bottom:24px">
        <div style="font-weight:700;margin-bottom:8px">📌 Rejoindre un weekend</div>
        <div style="display:flex;gap:8px">
          <input type="text" id="join-code" placeholder="CODE" maxlength="6"
            style="font-family:monospace;font-size:20px;text-align:center;letter-spacing:4px;text-transform:uppercase;padding:12px"
            onkeydown="if(event.key==='Enter')handleJoin()">
          <button class="btn bp" onclick="handleJoin()">Rejoindre</button>
        </div>
      </div>

      <div style="text-align:center;color:var(--g400);margin-bottom:16px;font-weight:600">— ou créer un nouveau —</div>

      <div class="fg"><label>✨ Nom du weekend *</label><input type="text" id="s-title" placeholder="Weekend ski, Anniv de Tom..." maxlength="100"></div>
      <div class="fg"><label>👤 Ton prénom *</label><input type="text" id="s-name" placeholder="Comment tu t'appelles ?" maxlength="50"></div>
      <div class="fg"><label>📝 Description</label><textarea id="s-desc" placeholder="Infos pratiques..." maxlength="500"></textarea></div>
      <div class="fg"><label>📍 Lieu</label><input type="text" id="s-loc" placeholder="Chamonix, Hossegor..."></div>
      <div class="fr">
        <div class="fg"><label>📅 Début *</label><input type="date" id="s-start"></div>
        <div class="fg"><label>📅 Fin *</label><input type="date" id="s-end"></div>
      </div>
      <button class="btn bp bf" onclick="handleCreate()" style="margin-top:8px">🚀 Créer le weekend !</button>
    </div>`;
}

async function handleJoin() {
  const code = document.getElementById('join-code').value.trim().toUpperCase();
  if (code.length < 4) { toast('⚠️ Code trop court !'); return; }
  await joinEvent(code);
}

async function handleCreate() {
  const title = document.getElementById('s-title').value.trim();
  const name = document.getElementById('s-name').value.trim();
  const desc = document.getElementById('s-desc').value.trim();
  const loc = document.getElementById('s-loc').value.trim();
  const start = document.getElementById('s-start').value;
  const end = document.getElementById('s-end').value;
  if (!title || !name || !start || !end) { toast('⚠️ Remplis les champs obligatoires !'); return; }
  await createEvent(title, name, desc, loc, start, end);
}

// ============================================
// RENDER EVENT
// ============================================
function renderEvent() {
  const e = eventData;
  if (!e) return;

  const confirmed = e.participants.filter(p => p.status === 'confirmed').length;
  const userName = currentUserId ? pName(currentUserId) : null;

  // Si pas encore identifié
  if (!currentUserId) {
    document.getElementById('app').innerHTML = `
      <div class="hero">
        <h1>${e.title}</h1>
        ${e.description ? '<p>' + e.description + '</p>' : ''}
        <div class="ei">
          ${e.location ? '<span>📍 ' + e.location + '</span>' : ''}
          <span>📅 ${new Date(e.date_start).toLocaleDateString('fr-FR',{day:'numeric',month:'short'})} → ${new Date(e.date_end).toLocaleDateString('fr-FR',{day:'numeric',month:'short'})}</span>
          <span>👥 ${confirmed} confirmé${confirmed>1?'s':''}</span>
        </div>
      </div>
      <div class="sc">
        <div style="text-align:center;margin-bottom:20px">
          <div style="font-size:48px;margin-bottom:8px">👋</div>
          <h2>Rejoindre</h2>
          <p class="sub">${e.title}</p>
        </div>
        <div class="fg"><label>Ton prénom</label><input type="text" id="join-name" placeholder="Comment tu t'appelles ?" maxlength="50" onkeydown="if(event.key==='Enter')handleJoinAsParticipant()"></div>
        <button class="btn bp bf" onclick="handleJoinAsParticipant()">Rejoindre 🎉</button>
      </div>`;
    return;
  }

  // Tabs
  const tabs = [{id:'overview',l:'📋 Général'},{id:'expenses',l:'💰 Comptes'},{id:'polls',l:'📊 Sondages'},{id:'chat',l:'💬 Chat'},{id:'todos',l:'✅ Tâches'}];
  const tabsH = tabs.map(t => `<button class="tab ${t.id===activeTab?'active':''}" onclick="switchTab('${t.id}')">${t.l}</button>`).join('');

  let content = '';
  if (activeTab === 'overview') content = renderParticipants();
  if (activeTab === 'expenses') content = renderExpenses() + renderBalance();
  if (activeTab === 'polls') content = renderPolls();
  if (activeTab === 'chat') content = renderChat();
  if (activeTab === 'todos') content = renderTodos();

  document.getElementById('app').innerHTML = `
    <div class="hero">
      <h1>${e.title}</h1>
      ${e.description ? '<p>' + e.description + '</p>' : ''}
      <div class="ei">
        ${e.location ? '<span>📍 ' + e.location + '</span>' : ''}
        <span>📅 ${new Date(e.date_start).toLocaleDateString('fr-FR',{day:'numeric',month:'short'})} → ${new Date(e.date_end).toLocaleDateString('fr-FR',{day:'numeric',month:'short'})}</span>
        <span>👥 ${confirmed} confirmé${confirmed>1?'s':''}</span>
      </div>
      <div class="code-box" onclick="copyCode()">
        <span>Code :</span>
        <span class="code">${e.code}</span>
        <span>📋</span>
      </div>
    </div>
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;padding:0 4px">
      <span style="font-size:13px;color:var(--g500)">Connecté : <strong style="color:var(--pri)">${userName}</strong></span>
      <div style="display:flex;gap:8px">
        <button class="btn bsm bs" onclick="switchUser()">Changer</button>
        <button class="btn bsm bs" onclick="leaveEvent()">Quitter</button>
      </div>
    </div>
    <div class="tabs">${tabsH}</div>
    ${content}`;

  if (activeTab === 'chat') {
    setTimeout(() => { const c = document.getElementById('chat-box'); if(c) c.scrollTop = c.scrollHeight; }, 50);
  }
}

function copyCode() {
  navigator.clipboard.writeText(eventData.code);
  toast('Code copié : ' + eventData.code + ' 📋');
}

function switchTab(t) { activeTab = t; renderEvent(); }

function switchUser() {
  currentUserId = null;
  localStorage.removeItem('wp_user_' + currentEventCode);
  renderEvent();
}

function leaveEvent() {
  currentEventCode = null;
  currentUserId = null;
  eventData = null;
  localStorage.removeItem('wp_current_event');
  renderHome();
}

async function handleJoinAsParticipant() {
  const name = document.getElementById('join-name').value.trim();
  if (!name) { toast('⚠️ Entre ton prénom !'); return; }
  await joinAsParticipant(name);
}

// ============================================
// PARTICIPANTS
// ============================================
function renderParticipants() {
  const items = eventData.participants.map(p => {
    const sBtns = ['confirmed','pending','declined'].map(s => {
      const icons = {confirmed:'✓',pending:'?',declined:'✗'};
      return `<button class="sb ${p.status===s?s:''}" onclick="setStatus('${p.id}','${s}')">${icons[s]}</button>`;
    }).join('');
    return `<div class="pi">
      <div class="av" style="background:${getAvatarColor(p.name)}">${getInitials(p.name)}</div>
      <span class="pn">${p.name}</span>
      <div class="sbs">${sBtns}</div>
      <button class="db" onclick="removeParticipant('${p.id}')">🗑️</button>
    </div>`;
  }).join('');

  return `<div class="card">
    <div class="ch">👥 Participants <span class="cnt">${eventData.participants.filter(p=>p.status==='confirmed').length} confirmés</span></div>
    <div class="cb">
      ${items}
      <button class="ab" onclick="toggleForm('add-p')" style="margin-top:12px">+ Ajouter un participant</button>
      <div class="ilf" id="add-p">
        <input type="text" id="new-p-name" placeholder="Prénom" maxlength="50" onkeydown="if(event.key==='Enter')addParticipant()">
        <button class="btn bp bsm" onclick="addParticipant()">Ajouter</button>
        <button class="btn bs bsm" onclick="toggleForm('add-p')">Annuler</button>
      </div>
    </div>
  </div>`;
}

async function setStatus(id, status) {
  await sb.from('participants').update({status}).eq('id', id);
  await loadEvent();
}

async function addParticipant() {
  const name = document.getElementById('new-p-name').value.trim();
  if (!name) return;
  const {error} = await sb.from('participants').insert({event_id: eventData.id, name, status: 'pending'});
  if (error) { toast(error.code === '23505' ? '⚠️ Nom déjà pris !' : '❌ ' + error.message); return; }
  toast(name + ' ajouté ! 🎉');
  await loadEvent();
}

async function removeParticipant(id) {
  if (!confirm('Retirer ce participant ?')) return;
  await sb.from('participants').delete().eq('id', id);
  await loadEvent();
}
